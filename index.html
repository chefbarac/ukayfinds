            * {

                color: #222;
            }

            header {
                background: #111;
                color: white;
                padding: 20px;
                text-align: center;
            }

            header a {
                color: white;
            }

            .container {
                max-width: 1200px;
                margin: auto;
                padding: 20px;
            }

            /* Controls */

            .controls {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
                gap: 12px;
                margin-bottom: 25px;
            }

            input,
            select {
                padding: 12px;
                border-radius: 8px;
                border: 1px solid #ccc;
            }

            /* Product */

            .products {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 20px;
            }

            .card {
                background: white;
                border-radius: 15px;
                overflow: hidden;
                box-shadow: 0 4px 15px #0001;
                position: relative;
                transition: all 0.3s ease;
            }

            /* Sold Banner Styling */
            .banner {
                position: absolute;
                top: 15px;
                left: -30px;
                color: white;
                text-transform: uppercase;
                font-weight: bold;
                font-size: 0.8rem;
                padding: 5px 40px;
                transform: rotate(-45deg);
                z-index: 10;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            }

            .sold-banner {
                left: -32px;
                background-color: #ff4d4d;
            }

            .reserved-banner {
                top: 20px;
                left: -42px;
                background-color: #f59e0b; /* Orange - Reserved */
            }

            .new-banner {
                left: -28px;
                background-color: #22c55e; /* Green - New */
            }

            /* Optional: Fade out the card slightly if sold */
            .card.sold {
                opacity: 0.6; /* Fades the entire card */
                filter: grayscale(60%); /* Tones down the vibrant colors and image */
                /* pointer-events: none; /* Optional: Prevents clicks on buttons/thumbs */
            }

            .card-body {
                padding: 15px;
            }

            .price {
                font-size: 14px;
            }

            .badge {
                display: inline-block;
                background: #eee;
                padding: 5px 10px;
                border-radius: 20px;
                font-size: 12px;
            }

            .favorite {
                position: absolute;
                right: 15px;
                top: 15px;
                background: #ffffffcc;
                border-radius: 50%;
                width: 40px;
                height: 40px;
                border: none;
                cursor: pointer;
                font-size: 20px;
            }
            .share-link {
                position: absolute;
                right: 60px;
                top: 15px;
                background: #ffffffcc;
                border-radius: 50%;
                width: 40px;
                height: 40px;
                border: none;
                cursor: pointer;
                font-size: 20px;
            }

            .favorite.active {
                color: red;
            }

            button {
                cursor: pointer;
            }

            .no-result {
                text-align: center;
                padding: 40px;
            }

            .carousel {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .main-img {
                width: 100%;
                height: 360px;
                object-fit: contain;
                border-radius: 10px;
            }

            .main-img::before {
                content: "";
                position: absolute;
                inset: -20px;
                background: inherit;
                filter: blur(15px);
                opacity: 0.8;
                z-index: -1;
            }

            .thumbs {
                display: flex;
                gap: 6px;
                overflow-x: auto;
            }

            .thumbs img {
                width: 50px;
                height: 50px;
                object-fit: cover;
                border-radius: 6px;
                cursor: pointer;
                border: 2px solid transparent;
            }

            .thumbs img:hover {
                border-color: #333;
            }

            .fb-contact-btn {
                display: inline-flex;
                align-items: center;
                background-color: #0084ff;
                color: #fff;
                font-family: system-ui, sans-serif;
                font-size: 13px;
                font-weight: 600;
                padding: 6px 12px;
                border-radius: 6px;
                text-decoration: none;
                transition: background 0.2s;
            }

            .fb-contact-btn:hover {
                background-color: #0066cc;
            }

            .fb-icon {
                width: 14px;
                height: 14px;
                margin-right: 5px;
                fill: currentColor;
            }

            .copy-btn {
                display: inline-flex;
                align-items: center;
                border: 1px solid black;
                color: #111;
                font-family: system-ui, sans-serif;
                font-size: 13px;
                font-weight: 600;
                padding: 6px 12px;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                transition: background 0.2s;
            }

            .copy-btn:hover {
                background-color: #444;
                color: white;
            }

            /* Turns green temporarily when clicked successfully */
            .copy-btn.copied {
                background-color: #00a86b;
            }

            .copy-icon {
                width: 14px;
                height: 14px;
                margin-right: 5px;
                fill: currentColor;
            }

            /* thumbnail loading */
            .main-img {
                transition: opacity 0.2s ease;
            }

            .img-spinner {
                display: none;
                position: absolute;
                inset: 0;
                margin: auto;
                width: 32px;
                height: 32px;
                border: 3px solid rgba(255, 255, 255, 0.1);
                border-top-color: #ffffff;
                border-radius: 50%;
                animation: spin 0.7s linear infinite;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            /* Scroll to top */
            #scrollTopBtn {
                position: fixed;
                bottom: 30px;
                right: 30px;
                z-index: 999;
                width: 48px;
                height: 48px;
                border-radius: 50%;
                background: #333;
                color: white;
                font-size: 20px;
                border: none;
                cursor: pointer;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            }

            /* Horizontal filter controls */
            .controls {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .search-row input[type="search"] {
                width: 100%;
            }

            .filter-group {
                display: flex;
                gap: 8px;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                scroll-snap-type: x proximity;
                padding: 2px 2px 8px;
                scrollbar-width: thin;
            }
            .filter-group::-webkit-scrollbar {
                height: 6px;
            }
            .filter-group::-webkit-scrollbar-thumb {
                background: #ccc;
                border-radius: 4px;
            }

            .chip {
                flex: 0 0 auto;
                scroll-snap-align: start;
                padding: 7px 16px;
                border-radius: 999px;
                border: 1px solid #ddd;
                background: #fff;
                color: #555;
                font-size: 13px;
                cursor: pointer;
                white-space: nowrap;
            }
            .chip:hover {
                background: #f5f5f5;
            }
            .chip.active {
                background: #111;
                border-color: #111;
                color: #fff;
            }

            .fav-row button {
                border-radius: 999px;
                padding: 8px 16px;
            }

            @media (min-width: 640px) {
                .filter-group {
                    overflow-x: visible;
                    flex-wrap: wrap;
                    padding: 0;
                }
            }

            /* Show Favorites */
            .fav-btn {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 8px 18px;
                border-radius: 999px;
                border: 1px solid #ddd;
                background: #fff;
                color: #555;
                font-size: 13px;
                font-weight: 500;
                cursor: pointer;
                transition:
                    background 0.15s ease,
                    border-color 0.15s ease,
                    color 0.15s ease;
            }

            .fav-btn:hover {
                background: #f5f5f5;
                border-color: #ccc;
            }

            .fav-btn:active {
                transform: scale(0.97);
            }

            .fav-btn i {
                font-size: 16px;
            }

            .fav-btn.active {
                background: #fdecec;
                border-color: #f5b8b8;
                color: #c0392b;
            }
        </style>

            function handleParams() {
                // 1. Get the query string from the URL (e.g., ?p=javascript)
                const urlParams = new URLSearchParams(window.location.search);

                // 2. Extract the value of the 'p' parameter
                const productNumber = urlParams.get("p");
                const collectionName = urlParams.get("c");
                // cleanParams();

                // 3. If 'p' exists in the URL, populate the input field
                if (productNumber) {
                    const searchInput = document.getElementById("search");
                    searchInput.value = `#${productNumber} `;
                    const event = new Event("input", {
                        bubbles: true,
                        cancelable: true,
                    });
                    searchInput.dispatchEvent(event);
                }

                if (collectionName) {
                    const collectionGroup = document.getElementById("collection");
                    const targetChip = collectionGroup.querySelector(`.chip[data-value="${collectionName}"]`);
                    if (targetChip) {
                        targetChip.click(); // triggers your existing delegated click handler
                        /*const event = new Event("click", {
                            bubbles: true,
                            cancelable: true,
                        });
                        targetChip.dispatchEvent(event);*/
                    } else {
                        console.warn(`No chip found for collection "${collectionName}"`);
                    }
                }
            }

            async function populateFilters() {
                const collections = [...new Set(products.map((p) => p.collection).filter(Boolean))].sort().map((collection) => ({
                    name: collection,
                    count: products.filter((p) => p.collection === collection).length,
                }));
                const sizes = [...new Set(products.map((p) => p.size).filter(Boolean))].sort(sizeComparator).map((size) => ({
                    name: size,
                    count: products.filter((p) => p.size === size).length,
                }));
                const prices = [...new Set(products.map((p) => p.price).filter((v) => v != null))]
                    .sort((a, b) => a - b)
                    .map((price) => ({
                        name: price,
                        count: products.filter((p) => p.price === price).length,
                    }));
                const statuses = [...new Set(products.map((p) => p.status).filter(Boolean))].sort().map((status) => ({
                    name: status,
                    count: products.filter((p) => p.status === status).length,
                }));

                /*
                const fillSelect = (id, items, labelFn, valueFn) => {

                        opt.value = valueFn ? valueFn(item) : item.name;

                const fillSelect = (id, items, labelFn, valueFn) => {
                    const group = document.getElementById(id);
                    // remove every chip except the "All ..." default (the one with empty value)
                    group.querySelectorAll('.chip:not([data-value=""])').forEach((c) => c.remove());

                    items.forEach((item) => {
                        const chip = document.createElement("button");
                        chip.className = "chip";
                        chip.type = "button";
                        chip.dataset.value = valueFn ? valueFn(item) : item.name;
                        chip.textContent = labelFn(item);
                        group.appendChild(chip);
                    });
                };

                fillSelect("collection", collections, (c) => `${c.name} (${c.count})`);
                fillSelect("size", sizes, (s) => `${s.name} (${s.count})`);
                fillSelect(
                    "price",
                    prices,
                    (p) => `₱${p.name} (${p.count})`,
                    (p) => String(p.name),
                );
                fillSelect("status", statuses, (c) => `${c.name} (${c.count})`);
            }

            function sizeComparator(a, b) {
                const ORDER = ["XXS", "XS", "S", "M", "L", "XL", "XXL", "3XL"];
                const ai = ORDER.indexOf(a.toUpperCase());
                const bi = ORDER.indexOf(b.toUpperCase());
                if (ai === -1 && bi === -1) return a.localeCompare(b);
                if (ai === -1) return 1;
                if (bi === -1) return -1;
                return ai - bi;
            }

            /* window.addEventListener("popstate", (e) => {
                // Re-push state to keep trapping the back button
                history.pushState(null, "", window.location.href);
                window.scrollTo({ top: 0, behavior: "smooth" });
            }); */

            /* scroll to top */
            (() => {
                const btn = document.getElementById("scrollTopBtn");

                window.addEventListener("scroll", () => {
                    btn.style.display = window.scrollY > 300 ? "block" : "none";
                });

                // hide initially
                btn.style.display = "none";
            })();

            document.addEventListener("DOMContentLoaded", () => {
                populateFilters();
                handleParams();
            });

            let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");

            let favoriteMode = false;

            const productContainer = document.getElementById("products");

            const activeImageIndex = {};

            function toDriveUrl(id) {
                return `https://lh3.googleusercontent.com/d/${id}`;
            }

            function setImage(productId, index) {
                const product = products.find((p) => p.id == productId);
                const carousel = document.querySelector(`#carousel-${productId}`);
                const imgEl = carousel.querySelector(".main-img");
                const spinner = carousel.querySelector(".img-spinner");

                // show spinner
                spinner.style.display = "block";
                // imgEl.style.opacity = "0";

                const full = new Image();
                full.onload = () => {
                    imgEl.src = full.src;
                    // imgEl.style.opacity = "1";
                    spinner.style.display = "none";
                };
                full.onerror = () => {
                    spinner.style.display = "none";
                    // imgEl.style.opacity = "1";
                };
                full.src = toDriveUrl(product.images[index]) + "=w600";

                activeImageIndex[productId] = index;
            }

            function debounce(fn, delay) {
                let timer;
                return function (...args) {
                    clearTimeout(timer);
                    timer = setTimeout(() => fn.apply(this, args), delay);
                };
            }

            // your gtag tracking call
            const trackFilter = debounce(function (filterValue) {
                // if (!filterValue) return; // don't track empty/cleared filter
                const search = document.getElementById("search").value.toLowerCase();
                const collection = document.getElementById("collection").value;
                const size = document.getElementById("size").value;
                const price = document.getElementById("price").value;
                const status = document.getElementById("status").value;

                gtag("event", "filter_applied", {
                    search,
                    collection,
                    size,
                    price,
                    favoriteMode,
                    status,
                });
            }, 3000); // wait 3 second after user stops typing

            function render() {
                let list = [...products];

                /*const search = document.getElementById("search").value.toLowerCase();
                const collection = document.getElementById("collection").value;
                const size = document.getElementById("size").value;
                const price = document.getElementById("price").value;
                const status = document.getElementById("status").value;*/
                const search = document.getElementById("search").value.toLowerCase();
                const collection = document.getElementById("collection").dataset.value;
                const size = document.getElementById("size").dataset.value;
                const price = document.getElementById("price").dataset.value;
                const status = document.getElementById("status").dataset.value;

                if (search) list = list.filter((x) => x.name.toLowerCase().includes(search));
                if (collection) list = list.filter((x) => x.collection === collection);
                if (size) list = list.filter((x) => x.size === size);
                if (price) list = list.filter((x) => x.price === Number(price));
                if (status) list = list.filter((x) => x.status === status);

                if (favoriteMode) list = list.filter((x) => favorites.includes(x.id));

                if (!list.length) {
                    productContainer.innerHTML = `
                          <div class="no-result">
                          No products found
                          </div>
                          `;

                    return;
                }

                const imageColors = {
                    Affordable: "linear-gradient(135deg, #F6EBDD 0%, #E4CDB2 50%, #CFAF8B 100%)",
                    Regular: "linear-gradient(135deg, #DCEEEA 0%, #A9CFC8 50%, #6FA8A0 100%)",
                    Premium: "linear-gradient(135deg, #F5E1DD 0%, #DDB1A8 50%, #B97870 100%)",
                };

                productContainer.innerHTML = list
                    .filter((p) => !p.is_archived)
                    .map((product) => {
                        const fav = favorites.includes(product.id);

                        return `
                          <div class="card ${product.is_sold ? "sold" : ""}">
                              ${product.is_sold ? `<div class="banner sold-banner">Sold</div>` : ""}
                              ${product.is_reserved && !product.is_sold ? `<div class="banner reserved-banner">Reserved</div>` : ""}
                              ${product.is_new && !product.is_sold && !product.is_reserved ? `<div class="banner new-banner">New</div>` : ""}
                          <button
                          class="favorite ${fav ? "active" : ""}"
                          onclick="toggleFavorite(${product.id})">
                            ${fav ? "❤️" : "♡"}
                          </button>
                          <button
                            class="share-link"
                            onclick="copyShareLink(${product.id})">
                                ${"🔗"}
                            </button>

                          <div class="carousel" id="carousel-${product.id}">
                            <img src="${toDriveUrl(product.images[0])}=w600" class="main-img" style="background: ${imageColors[product.category] || "#c8c8c8"};" loading="lazy">
                            <div class="img-spinner"></div>
                            <div class="thumbs">
                              ${product.images
                                  .map(
                                      (img, i) => `
                                        <img src="${toDriveUrl(img)}=w100" onclick="setImage(${product.id}, ${i})"  loading="lazy">
                                    `,
                                  )
                                  .join("")}
                            </div>
                          </div>

                          <div class="card-body">
                            <h3>
                                ${product.name}
                            </h3>

                            <p>
                                ${product.description}
                            </p>

                            <span class="badge">
                              ${product.collection}
                            </span>

                            <span class="badge">
                                Size ${product.size}
                            </span>

                            <br><br>

                            <span class="badge" style="background: ${imageColors[product.category]}">
                              ${categoryMap[product.category]}
                            </span>

                            <span class="price">
                              <span style="color: gray; text-decoration: line-through; font-style: italic;">₱${product.anchor_price}</span>
                              <span style="color: #e63946; font-weight: bold;">₱${product.price}</span>
                            </span>
                          </div>
                          </div>

                          `;
                    })
                    .join("");
            }

            function copyProductLink(productId) {
                const link = `https://chefbarac.github.io/ukayfinds/?p=${productId}`;
                // Copy to clipboard
                navigator.clipboard.writeText(link).then(() => {
                    alert(`Product link copied to clipboard!`);
                });
            }

            function copyShareLink(productId) {
                const url = `${window.location.origin}${window.location.pathname}?p=${productId}`;
                navigator.clipboard.writeText(url).then(() => {
                    alert("Product link now copied to clipboard!");
                    // optional: show a brief "Copied!" toast
                });
            }

            function scrollBackToTop() {
                window.scrollTo({ top: 0, behavior: "smooth" });
                gtag("event", "button_click", {
                    button_name: "scroll_back_to_top",
                });
            }

            function toggleFavorite(id) {
                if (favorites.includes(id)) {
                    favorites = favorites.filter((x) => x !== id);
                } else {
                    favorites.push(id);
                }

                localStorage.setItem("favorites", JSON.stringify(favorites));

                render();
            }

            function showFavorites() {
                document.getElementById("btnShowFavorites").classList.toggle("active");
                favoriteMode = !favoriteMode;

                /*
                const btn = document.getElementById("btnShowFavorites");
                if (btn) btn.innerText = favoriteMode ? "♡ Favorites" : "❤️ Favorites"; */

                render();
            }

            /*
            document.querySelectorAll("input,select").forEach((x) =>
                x.addEventListener("input", (e) => {
                    render();
                    trackFilter(e.target.value); // gtag waits for pause
                }),
            );*/

            // Search input still works the same way
            document.getElementById("search").addEventListener("input", (e) => {
                render();
                trackFilter(e.target.value);
            });

            // Filter chips: click replaces input
            document.querySelectorAll(".filter-group").forEach((group) => {
                group.addEventListener("click", (e) => {
                    const btn = e.target.closest(".chip");
                    if (!btn) return;

                    group.querySelectorAll(".chip").forEach((c) => c.classList.remove("active"));
                    btn.classList.add("active");
                    group.dataset.value = btn.dataset.value;

                    render();
                    trackFilter(btn.dataset.value);
                });
            });

            // fetchData();
            render();
        </script>
    </body>
</html>
