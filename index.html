<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>" />

        <title>Ukay Finds</title>

        <style>
            * {
                box-sizing: border-box;
                font-family: Inter, Arial, sans-serif;
            }

            body {
                margin: 0;
                background: #f7f7f7;
                color: #222;
            }

            header {
                background: #111;
                color: white;
                padding: 20px;
                text-align: center;
            }

            header a {
                color: white;
            }

            .container {
                max-width: 1200px;
                margin: auto;
                padding: 20px;
            }

            /* Controls */

            .controls {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
                gap: 12px;
                margin-bottom: 25px;
            }

            input,
            select {
                padding: 12px;
                border-radius: 8px;
                border: 1px solid #ccc;
            }

            /* Product */

            .products {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 20px;
            }

            .card {
                background: white;
                border-radius: 15px;
                overflow: hidden;
                box-shadow: 0 4px 15px #0001;
                position: relative;
                transition: all 0.3s ease;
            }

            /* Sold Banner Styling */
            .sold-banner {
                position: absolute;
                top: 15px;
                left: -40px;
                background-color: #ff4d4d;
                color: white;
                text-transform: uppercase;
                font-weight: bold;
                font-size: 0.8rem;
                padding: 5px 40px;
                transform: rotate(-45deg);
                z-index: 10;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            }

            /* Optional: Fade out the card slightly if sold */
            .card.sold {
                opacity: 0.6; /* Fades the entire card */
                filter: grayscale(60%); /* Tones down the vibrant colors and image */
                /* pointer-events: none; /* Optional: Prevents clicks on buttons/thumbs */
            }

            .card img {
                width: 100%;
                height: 260px;
                object-fit: cover;
            }

            .card-body {
                padding: 15px;
            }

            .price {
                color: #e63946;
                font-weight: bold;
                font-size: 14px;
            }

            .badge {
                display: inline-block;
                background: #eee;
                padding: 5px 10px;
                border-radius: 20px;
                font-size: 12px;
            }

            .favorite {
                position: absolute;
                right: 15px;
                top: 15px;
                background: white;
                border-radius: 50%;
                width: 40px;
                height: 40px;
                border: none;
                cursor: pointer;
                font-size: 20px;
            }

            .favorite.active {
                color: red;
            }

            button {
                cursor: pointer;
            }

            .no-result {
                text-align: center;
                padding: 40px;
            }

            .carousel {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .main-img {
                width: 100%;
                height: 260px;
                object-fit: cover;
                border-radius: 10px;
            }

            .thumbs {
                display: flex;
                gap: 6px;
                overflow-x: auto;
            }

            .thumbs img {
                width: 50px;
                height: 50px;
                object-fit: cover;
                border-radius: 6px;
                cursor: pointer;
                border: 2px solid transparent;
            }

            .thumbs img:hover {
                border-color: #333;
            }

            .fb-contact-btn {
                display: inline-flex;
                align-items: center;
                background-color: #0084ff;
                color: #fff;
                font-family: system-ui, sans-serif;
                font-size: 13px;
                font-weight: 600;
                padding: 6px 12px;
                border-radius: 6px;
                text-decoration: none;
                transition: background 0.2s;
            }

            .fb-contact-btn:hover {
                background-color: #0066cc;
            }

            .fb-icon {
                width: 14px;
                height: 14px;
                margin-right: 5px;
                fill: currentColor;
            }

            .copy-btn {
                display: inline-flex;
                align-items: center;
                border: 1px solid black;
                color: #111;
                font-family: system-ui, sans-serif;
                font-size: 13px;
                font-weight: 600;
                padding: 6px 12px;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                transition: background 0.2s;
            }

            .copy-btn:hover {
                background-color: #444;
                color: white;
            }

            /* Turns green temporarily when clicked successfully */
            .copy-btn.copied {
                background-color: #00a86b;
            }

            .copy-icon {
                width: 14px;
                height: 14px;
                margin-right: 5px;
                fill: currentColor;
            }
        </style>
    </head>

    <body>
        <header>
            <h1>🛍️ Ukay Finds</h1>
            <p>
                Visit our <a target="_blank" rel="noopener noreferrer" href="https://www.facebook.com/61591084660577">Facebook</a> page or
                <a target="_blank" rel="noopener noreferrer" href="https://m.me/61591084660577">chat</a> with the seller.
            </p>
        </header>

        <div class="container">
            <div class="controls">
                <input type="search" id="search" placeholder="Search clothes..." />

                <select id="collection">
                    <option value="">All Collections</option>
                </select>

                <select id="size">
                    <option value="">All Sizes</option>
                </select>

                <select id="price">
                    <option value="">Any Price</option>
                </select>

                <button id="btnShowFavorites" onclick="showFavorites()">❤️ Favorites</button>
            </div>

            <div id="products" class="products">Loading products...</div>
        </div>

        <script>
            let products = [
                {
                    id: 1,
                    name: "#1 Vintage Nike Shirt",
                    description: "90s style",
                    collection: "T-Shirt",
                    size: "M",
                    category: "Fair",
                    price: 59,
                    date_purchased: "",
                    is_sold: false,
                    date_sold: "",
                    is_archived: false,
                    images: "1zBsbPMEEqgwyTlrFlt9wpJgB0DQm2qDD",
                },
                {
                    id: 2,
                    name: "#2 Denim Jacket",
                    description: "Oversized",
                    collection: "Jacket",
                    size: "L",
                    category: "Very Good",
                    price: 99,
                    date_purchased: "",
                    is_sold: false,
                    date_sold: "",
                    is_archived: false,
                    images: "1xIvJBcnPLznYTqVtiJ3RAmWlqqk4cZum||14nxa5bZnb3RDurHrign_ZKCJGlZ9bYA8",
                },
                {
                    id: 3,
                    name: "#3 Summer Dress",
                    description: "Floral casual dress",
                    collection: "Dress",
                    size: "S",
                    category: "Good",
                    price: 79,
                    date_purchased: "",
                    is_sold: false,
                    date_sold: "",
                    is_archived: false,
                    images: "1T3rKK6HM79IfMa7C5LCvXtT7lNF3TDYL||1eHzOJ8hEWh47rd5vET5SGhhifndBI5-G",
                },
            ];
            // Using google sheet as database
            /*let products = [];
                      async function fetchData() {
                          fetch("https://script.google.com/macros/s/XXXXXXXXX/exec")
                              .then((res) => res.json())
                              .then((data) => {
                                  products = data.map((p) => {
                                      return { ...p, images: p.images ? p.images.split("||") : [] };
                                  });
                                  render();
                              });
                      }*/
            products = products.toReversed().map((p) => {
                return { ...p, images: p.images ? p.images.split("||") : [] };
            });

            function cleanParams() {
                const url = new URL(window.location);

                // Modify your parameters
                url.searchParams.delete("p");
                url.searchParams.delete("c");

                // Clean up: If no parameters remain, strip the '?'
                const cleanUrl = url.searchParams.toString() ? url.toString() : url.toString().split("?")[0];

                window.history.replaceState({}, "", cleanUrl);
            }

            function handleParams() {
                // 1. Get the query string from the URL (e.g., ?p=javascript)
                const urlParams = new URLSearchParams(window.location.search);

                // 2. Extract the value of the 'p' parameter
                const productNumber = urlParams.get("p");
                const collectionName = urlParams.get("c");
                cleanParams();

                // 3. If 'p' exists in the URL, populate the input field
                if (productNumber) {
                    const searchInput = document.getElementById("search");
                    searchInput.value = `#${productNumber}`;
                    // 2. Create a new 'input' event
                    const event = new Event("input", {
                        bubbles: true, // Allows the event to bubble up the DOM tree
                        cancelable: true, // Allows the event to be canceled
                    });

                    // 3. Dispatch the event on the input element
                    searchInput.dispatchEvent(event);
                }
                if (collectionName) {
                    const collectionInput = document.getElementById("collection");
                    collectionInput.value = `${collectionName}`;
                    // 2. Create a new 'input' event
                    const event = new Event("input", {
                        bubbles: true, // Allows the event to bubble up the DOM tree
                        cancelable: true, // Allows the event to be canceled
                    });

                    // 3. Dispatch the event on the input element
                    collectionInput.dispatchEvent(event);
                }
            }

            async function populateFilters() {
                const collections = [...new Set(products.map((p) => p.collection).filter(Boolean))].sort();
                const sizes = [...new Set(products.map((p) => p.size).filter(Boolean))].sort(sizeComparator);
                const prices = [...new Set(products.map((p) => p.price).filter((v) => v != null))].sort((a, b) => a - b);

                const fillSelect = (id, items, labelFn, valueFn) => {
                    const select = document.getElementById(id);
                    select.querySelectorAll('option:not([value=""])').forEach((o) => o.remove());
                    items.forEach((item) => {
                        const opt = document.createElement("option");
                        opt.value = valueFn ? valueFn(item) : item;
                        opt.textContent = labelFn(item);
                        select.appendChild(opt);
                    });
                };

                fillSelect("collection", collections, (c) => c);
                fillSelect("size", sizes, (s) => s);
                fillSelect(
                    "price",
                    prices,
                    (p) => `₱${p}`,
                    (p) => String(p),
                );
            }

            function sizeComparator(a, b) {
                const ORDER = ["XXS", "XS", "S", "M", "L", "XL", "XXL", "3XL"];
                const ai = ORDER.indexOf(a.toUpperCase());
                const bi = ORDER.indexOf(b.toUpperCase());
                if (ai === -1 && bi === -1) return a.localeCompare(b);
                if (ai === -1) return 1;
                if (bi === -1) return -1;
                return ai - bi;
            }

            document.addEventListener("DOMContentLoaded", () => {
                populateFilters();
                handleParams();
            });

            let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");

            let favoriteMode = false;

            const productContainer = document.getElementById("products");

            const activeImageIndex = {};

            function toDriveUrl(id) {
                return `https://lh3.googleusercontent.com/d/${id}`;
            }

            function setImage(productId, index) {
                const product = products.find((p) => p.id == productId);

                const imgEl = document.querySelector(`#carousel-${productId} .main-img`);

                imgEl.src = toDriveUrl(product.images[index]);

                activeImageIndex[productId] = index;
            }

            function render() {
                let list = [...products];

                const search = document.getElementById("search").value.toLowerCase();

                const collection = document.getElementById("collection").value;

                const size = document.getElementById("size").value;

                const price = document.getElementById("price").value;

                if (search) list = list.filter((x) => x.name.toLowerCase().includes(search));

                if (collection) list = list.filter((x) => x.collection === collection);

                if (size) list = list.filter((x) => x.size === size);

                if (price) list = list.filter((x) => x.price === Number(price));

                if (favoriteMode) list = list.filter((x) => favorites.includes(x.id));

                if (!list.length) {
                    productContainer.innerHTML = `
                      <div class="no-result">
                      No products found
                      </div>
                      `;

                    return;
                }

                // TODO: .filter((p) => !p.is_sold)
                productContainer.innerHTML = list
                    .filter((p) => !p.is_archived)
                    .map((product) => {
                        const fav = favorites.includes(product.id);

                        return `

                      <div class="card ${product.is_sold ? "sold" : ""}">

                          ${product.is_sold ? `<div class="sold-banner">Sold</div>` : ""}

                      <button
                      class="favorite ${fav ? "active" : ""}"
                      onclick="toggleFavorite(${product.id})">

                      ${fav ? "❤️" : "♡"}

                      </button>


                      <div class="carousel" id="carousel-${product.id}">
                        <img src="${toDriveUrl(product.images[0])}" class="main-img">
                        <div class="thumbs">
                          ${product.images
                              .map(
                                  (img, i) => `
                            <img src="${toDriveUrl(img)}" onclick="setImage(${product.id}, ${i})">
                          `,
                              )
                              .join("")}
                        </div>
                      </div>


                      <div class="card-body">


                      <h3>
                      ${product.name}
                      </h3>


                      <p>
                      ${product.description}
                      </p>


                      <span class="badge">
                          ${product.collection}
                        </span>


                        <span class="badge">
                            Size ${product.size}
                        </span>

                        <span class="price">
                          ₱${product.price}
                          </span>

                      </div>


                      </div>

                      `;
                    })
                    .join("");
            }

            function copyProductLink(productId) {
                const link = `https://chefbarac.github.io/portfolio?p=${productId}`;
                // Copy to clipboard
                navigator.clipboard.writeText(link).then(() => {
                    alert(`Product link copied to clipboard!`);
                });
            }

            function toggleFavorite(id) {
                if (favorites.includes(id)) {
                    favorites = favorites.filter((x) => x !== id);
                } else {
                    favorites.push(id);
                }

                localStorage.setItem("favorites", JSON.stringify(favorites));

                render();
            }

            function showFavorites() {
                favoriteMode = !favoriteMode;

                const btn = document.getElementById("btnShowFavorites");
                if (btn) btn.innerText = favoriteMode ? "♡ Favorites" : "❤️ Favorites";

                render();
            }

            document.querySelectorAll("input,select").forEach((x) => x.addEventListener("input", render));

            // fetchData();
            render();
        </script>
    </body>
</html>
