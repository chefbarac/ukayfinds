        <style>
            * {
                box-sizing: border-box;
                font-family: Inter, Arial, sans-serif;
            }

            body {
                margin: 0;
                background: #f7f7f7;
                color: #222;
            }

            header {
                background: #111;
                color: white;
                padding: 20px;
                text-align: center;
            }

            header a {
                color: white;
            }

            .container {
                max-width: 1200px;
                margin: auto;
                padding: 20px;
            }

            /* Controls */

            .controls {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
                gap: 12px;
                margin-bottom: 25px;
            }

            input,
            select {
                padding: 12px;
                border-radius: 8px;
                border: 1px solid #ccc;
            }

            /* Product */

            .products {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 20px;
            }

            .card {
                background: white;
                border-radius: 15px;
                overflow: hidden;
                box-shadow: 0 4px 15px #0001;
                position: relative;
                transition: all 0.3s ease;
            }

            /* Sold Banner Styling */
            .sold-banner {
                position: absolute;
                top: 15px;
                left: -40px;
                background-color: #ff4d4d;
                color: white;
                text-transform: uppercase;
                font-weight: bold;
                font-size: 0.8rem;
                padding: 5px 40px;
                transform: rotate(-45deg);
                z-index: 10;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            }

            /* Optional: Fade out the card slightly if sold */
            .card.sold {
                opacity: 0.6; /* Fades the entire card */
                filter: grayscale(60%); /* Tones down the vibrant colors and image */
                /* pointer-events: none; /* Optional: Prevents clicks on buttons/thumbs */
            }

            .card-body {
                padding: 15px;
            }

            .price {
                font-size: 14px;
            }

            .badge {
                display: inline-block;
                background: #eee;
                padding: 5px 10px;
                border-radius: 20px;
                font-size: 12px;
            }

            .favorite {
                position: absolute;
                right: 15px;
                top: 15px;
                background: #ffffffcc;
                border-radius: 50%;
                width: 40px;
                height: 40px;
                border: none;
                cursor: pointer;
                font-size: 20px;
            }
            .share-link {
                position: absolute;
                right: 60px;
                top: 15px;
                background: #ffffffcc;
                border-radius: 50%;
                width: 40px;
                height: 40px;
                border: none;
                cursor: pointer;
                font-size: 20px;
            }

            .favorite.active {
                color: red;
            }

            button {
                cursor: pointer;
            }

            .no-result {
                text-align: center;
                padding: 40px;
            }

            .carousel {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .main-img {
                width: 100%;
                height: 360px;
                object-fit: contain;
                border-radius: 10px;
            }

            .main-img::before {
                content: "";
                position: absolute;
                inset: -20px;
                background: inherit;
                filter: blur(15px);
                opacity: 0.8;
                z-index: -1;
            }

            .thumbs {
                display: flex;
                gap: 6px;
                overflow-x: auto;
            }

            .thumbs img {
                width: 50px;
                height: 50px;
                object-fit: cover;
                border-radius: 6px;
                cursor: pointer;
                border: 2px solid transparent;
            }

            .thumbs img:hover {
                border-color: #333;
            }

            .fb-contact-btn {
                display: inline-flex;
                align-items: center;
                background-color: #0084ff;
                color: #fff;
                font-family: system-ui, sans-serif;
                font-size: 13px;
                font-weight: 600;
                padding: 6px 12px;
                border-radius: 6px;
                text-decoration: none;
                transition: background 0.2s;
            }

            .fb-contact-btn:hover {
                background-color: #0066cc;
            }

            .fb-icon {
                width: 14px;
                height: 14px;
                margin-right: 5px;
                fill: currentColor;
            }

            .copy-btn {
                display: inline-flex;
                align-items: center;
                border: 1px solid black;
                color: #111;
                font-family: system-ui, sans-serif;
                font-size: 13px;
                font-weight: 600;
                padding: 6px 12px;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                transition: background 0.2s;
            }

            .copy-btn:hover {
                background-color: #444;
                color: white;
            }

            /* Turns green temporarily when clicked successfully */
            .copy-btn.copied {
                background-color: #00a86b;
            }

            .copy-icon {
                width: 14px;
                height: 14px;
                margin-right: 5px;
                fill: currentColor;
            }
        </style>

            function cleanParams() {
                const url = new URL(window.location);

                // Modify your parameters
                url.searchParams.delete("p");
                url.searchParams.delete("c");

                // Clean up: If no parameters remain, strip the '?'
                const cleanUrl = url.searchParams.toString() ? url.toString() : url.toString().split("?")[0];

                window.history.replaceState({}, "", cleanUrl);
            }

            function handleParams() {
                // 1. Get the query string from the URL (e.g., ?p=javascript)
                const urlParams = new URLSearchParams(window.location.search);

                // 2. Extract the value of the 'p' parameter
                const productNumber = urlParams.get("p");
                const collectionName = urlParams.get("c");
                cleanParams();

                // 3. If 'p' exists in the URL, populate the input field
                if (productNumber) {
                    const searchInput = document.getElementById("search");
                    searchInput.value = `#${productNumber}`;
                    // 2. Create a new 'input' event
                    const event = new Event("input", {
                        bubbles: true, // Allows the event to bubble up the DOM tree
                        cancelable: true, // Allows the event to be canceled
                    });

                    // 3. Dispatch the event on the input element
                    searchInput.dispatchEvent(event);
                }
                if (collectionName) {
                    const collectionInput = document.getElementById("collection");
                    collectionInput.value = `${collectionName}`;
                    // 2. Create a new 'input' event
                    const event = new Event("input", {
                        bubbles: true, // Allows the event to bubble up the DOM tree
                        cancelable: true, // Allows the event to be canceled
                    });

                    // 3. Dispatch the event on the input element
                    collectionInput.dispatchEvent(event);
                }
            }

            async function populateFilters() {
                const collections = [...new Set(products.map((p) => p.collection).filter(Boolean))].sort().map((collection) => ({
                    name: collection,
                    count: products.filter((p) => p.collection === collection).length,
                }));
                const sizes = [...new Set(products.map((p) => p.size).filter(Boolean))].sort(sizeComparator).map((size) => ({
                    name: size,
                    count: products.filter((p) => p.size === size).length,
                }));
                const prices = [...new Set(products.map((p) => p.price).filter((v) => v != null))]
                    .sort((a, b) => a - b)
                    .map((price) => ({
                        name: price,
                        count: products.filter((p) => p.price === price).length,
                    }));

                const fillSelect = (id, items, labelFn, valueFn) => {
                    const select = document.getElementById(id);
                    select.querySelectorAll('option:not([value=""])').forEach((o) => o.remove());
                    items.forEach((item) => {
                        const opt = document.createElement("option");
                        opt.value = valueFn ? valueFn(item) : item.name;
                        opt.textContent = labelFn(item);
                        select.appendChild(opt);
                    });
                };

                fillSelect("collection", collections, (c) => `${c.name} (${c.count})`);
                fillSelect("size", sizes, (s) => `${s.name} (${s.count})`);
                fillSelect(
                    "price",
                    prices,
                    (p) => `₱${p.name} (${p.count})`,
                    (p) => String(p.name),
                );
            }

            function sizeComparator(a, b) {
                const ORDER = ["XXS", "XS", "S", "M", "L", "XL", "XXL", "3XL"];
                const ai = ORDER.indexOf(a.toUpperCase());
                const bi = ORDER.indexOf(b.toUpperCase());
                if (ai === -1 && bi === -1) return a.localeCompare(b);
                if (ai === -1) return 1;
                if (bi === -1) return -1;
                return ai - bi;
            }

  </div>
`;

                    // Animate
                    (function () {
                        const banner = document.getElementById("fb-tip-banner");
                        const icon = document.getElementById("fb-tip-icon");
                        const dots = document.getElementById("fb-dots");
                        const arrow = document.getElementById("fb-arrow");
                        const shimmer = document.getElementById("fb-shimmer");
                        let t = 0;

                        function sweep() {
                            shimmer.animate([{ transform: "translateX(-100%)" }, { transform: "translateX(200%)" }], { duration: 900, easing: "ease-in-out" });
                        }

                        function cycle() {
                            if (t === 0) {
                                icon.animate([{ transform: "translateY(0)" }, { transform: "translateY(-5px)" }, { transform: "translateY(0)" }], { duration: 400, easing: "ease-out" });
                                setTimeout(sweep, 200);
                            } else if (t === 1) {
                                dots.animate(
                                    [
                                        { background: "#f4f4f4", boxShadow: "none" },
                                        { background: "#ddeeff", boxShadow: "0 0 0 2px #5599ee" },
                                        { background: "#f4f4f4", boxShadow: "none" },
                                    ],
                                    { duration: 700, easing: "ease-in-out" },
                                );
                                arrow.animate([{ opacity: 0, transform: "translateY(4px)" }, { opacity: 1, transform: "translateY(0)" }, { opacity: 1, transform: "translateY(0)" }, { opacity: 0 }], {
                                    duration: 1400,
                                });
                            } else {
                                banner.animate([{ transform: "scale(1)" }, { transform: "scale(1.015)" }, { transform: "scale(1)" }], { duration: 300, easing: "ease-out" });
                                setTimeout(sweep, 100);
                            }
                            t = (t + 1) % 3;
                        }

                        cycle();
                        setInterval(cycle, 2200);
                    })();

            let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");

            let favoriteMode = false;

            const productContainer = document.getElementById("products");

            const activeImageIndex = {};

            function toDriveUrl(id) {
                return `https://lh3.googleusercontent.com/d/${id}`;
            }

            function setImage(productId, index) {
                const product = products.find((p) => p.id == productId);

                const imgEl = document.querySelector(`#carousel-${productId} .main-img`);

                imgEl.src = toDriveUrl(product.images[index]);

                activeImageIndex[productId] = index;
            }

            function render() {
                let list = [...products];

                const search = document.getElementById("search").value.toLowerCase();

                const collection = document.getElementById("collection").value;

                const size = document.getElementById("size").value;

                const price = document.getElementById("price").value;

                if (search) list = list.filter((x) => x.name.toLowerCase().includes(search));

                if (collection) list = list.filter((x) => x.collection === collection);

                if (size) list = list.filter((x) => x.size === size);

                if (price) list = list.filter((x) => x.price === Number(price));

                if (favoriteMode) list = list.filter((x) => favorites.includes(x.id));

                if (!list.length) {
                    productContainer.innerHTML = `
                          <div class="no-result">
                          No products found
                          </div>
                          `;

                    return;
                }

                const imageColors = {
                    Affordable: "linear-gradient(135deg, #F6EBDD 0%, #E4CDB2 50%, #CFAF8B 100%)",
                    Regular: "linear-gradient(135deg, #DCEEEA 0%, #A9CFC8 50%, #6FA8A0 100%)",
                    Premium: "linear-gradient(135deg, #F5E1DD 0%, #DDB1A8 50%, #B97870 100%)",
                };

                productContainer.innerHTML = list
                    .filter((p) => !p.is_archived)
                    .map((product) => {
                        const fav = favorites.includes(product.id);

                        return `
                          <div class="card ${product.is_sold ? "sold" : ""}">
                              ${product.is_sold ? `<div class="sold-banner">Sold</div>` : ""}
                          <button
                          class="favorite ${fav ? "active" : ""}"
                          onclick="toggleFavorite(${product.id})">
                            ${fav ? "❤️" : "♡"}
                          </button>
                          <button
                            class="share-link"
                            onclick="copyShareLink(${product.id})">
                                ${"🔗"}
                            </button>

                          <div class="carousel" id="carousel-${product.id}">
                            <img src="${toDriveUrl(product.images[0])}" class="main-img" style="background: ${imageColors[product.category] || "#c8c8c8"};">
                            <div class="thumbs">
                              ${product.images
                                  .map(
                                      (img, i) => `
                                        <img src="${toDriveUrl(img)}" onclick="setImage(${product.id}, ${i})">
                                    `,
                                  )
                                  .join("")}
                            </div>
                          </div>

                          <div class="card-body">
                            <h3>
                                ${product.name}
                            </h3>

                            <p>
                                ${product.description}
                            </p>

                            <span class="badge">
                              ${product.collection}
                            </span>

                            <span class="badge">
                                Size ${product.size}
                            </span>

                            <br><br>

                            <span class="badge" style="background: ${imageColors[product.category]}">
                              ${categoryMap[product.category]}
                            </span>

                            <span class="price">
                              <span style="color: gray; text-decoration: line-through; font-style: italic;">₱${product.anchor_price}</span>
                              <span style="color: #e63946; font-weight: bold;">₱${product.price}</span>
                            </span>
                          </div>
                          </div>

                          `;
                    })
                    .join("");
            }

            function copyProductLink(productId) {
                const link = `https://chefbarac.github.io/ukayfinds/?p=${productId}`;
                // Copy to clipboard
                navigator.clipboard.writeText(link).then(() => {
                    alert(`Product link copied to clipboard!`);
                });
            }

            function copyShareLink(productId) {
                const url = `${window.location.origin}${window.location.pathname}?p=${productId}`;
                navigator.clipboard.writeText(url).then(() => {
                    alert("Product link now copied to clipboard!");
                    // optional: show a brief "Copied!" toast
                });
            }

            function toggleFavorite(id) {
                if (favorites.includes(id)) {
                    favorites = favorites.filter((x) => x !== id);
                } else {
                    favorites.push(id);
                }

                localStorage.setItem("favorites", JSON.stringify(favorites));

                render();
            }

            function showFavorites() {
                favoriteMode = !favoriteMode;

                const btn = document.getElementById("btnShowFavorites");
                if (btn) btn.innerText = favoriteMode ? "♡ Favorites" : "❤️ Favorites";

                render();
            }

            document.querySelectorAll("input,select").forEach((x) => x.addEventListener("input", render));

            render();
